<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/images/Logo_PaoJot.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2C6488" />
    <meta name="description" content="PaoJot – จัดการการเงินส่วนตัว" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/Logo_PaoJot.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>PaoJot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              indigo: {
                50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                600: '#4f46e5', 700: '#4338ca'
              }
            },
            keyframes: {
              fadeSlideIn: {
                '0%':   { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              }
            },
            animation: {
              'fade-in': 'fadeSlideIn 0.28s cubic-bezier(0.16,1,0.3,1) forwards'
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
